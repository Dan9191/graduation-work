name: CI

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [ main, master ]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:

  changes:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      article: ${{ steps.filter.outputs.article }}
      gateway: ${{ steps.filter.outputs.gateway }}
      rag: ${{ steps.filter.outputs.rag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'graduation-frontend/**'
            
            article:
              - 'article/**'
            
            gateway:
              - 'gateway/**'
            
            rag:
              - 'rag/**'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: graduation-frontend

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: graduation-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false

      - name: Build React app
        run: npm run build

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/frontend:${GITHUB_SHA}" >> $GITHUB_ENV

      - name: Build Docker image
        working-directory: graduation-frontend
        run: |
          docker build -t $IMAGE_NAME .

      - name: Push Docker image
        run: |
          docker push $IMAGE_NAME
    

  article:
    needs: changes
    if: needs.changes.outputs.article == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :article:test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/article:${GITHUB_SHA}
            
          docker build \
            -t $IMAGE \
            -f article/Dockerfile \
            .
            
          docker push $IMAGE
    

  gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :gateway:test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/gateway:${GITHUB_SHA}
            
          docker build \
            -t $IMAGE \
            -f gateway/Dockerfile \
            .
            
          docker push $IMAGE
    

  rag:
    needs: changes
    if: needs.changes.outputs.rag == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :rag:test

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/rag:${GITHUB_SHA}
            
          docker build \
            -t $IMAGE \
            -f rag/Dockerfile \
            .
            
          docker push $IMAGE