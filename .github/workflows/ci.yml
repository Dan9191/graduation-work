name: CI Monorepo

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main, master]
  pull_request:

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      article:  ${{ steps.filter.outputs.article }}
      gateway:  ${{ steps.filter.outputs.gateway }}
      rag:      ${{ steps.filter.outputs.rag }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'graduation-frontend/**'
            article:
              - 'article/**'
            gateway:
              - 'gateway/**'
            rag:
              - 'rag/**'
            docs:
              - 'docs-project/**'

  # ────────────────────────────── Frontend ──────────────────────────────
  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graduation-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: graduation-frontend/package-lock.json
      - run: npm ci
      - run: npm test -- --watchAll=false

  build-frontend:
    needs: [changes, test-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: graduation-frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: graduation-frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  docker-frontend:
    needs: [changes, build-frontend]
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        working-directory: graduation-frontend
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/frontend:${GITHUB_SHA}
          docker build -t $IMAGE .
          docker push $IMAGE

  # ────────────────────────────── Article ──────────────────────────────
  test-article:
    needs: changes
    if: needs.changes.outputs.article == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :article:test

  build-article:
    needs: [changes, test-article]
    if: needs.changes.outputs.article == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :article:build

  docker-article:
    needs: [changes, build-article]
    if: needs.changes.outputs.article == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/article:${GITHUB_SHA}
          docker build -t $IMAGE -f article/Dockerfile .
          docker push $IMAGE

  # ────────────────────────────── Rag ──────────────────────────────
  test-rag:
    needs: changes
    if: needs.changes.outputs.rag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :rag:test

  build-rag:
    needs: [changes, test-rag]
    if: needs.changes.outputs.rag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :rag:build

  docker-rag:
    needs: [changes, build-rag]
    if: needs.changes.outputs.rag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/rag:${GITHUB_SHA}
          docker build -t $IMAGE -f rag/Dockerfile .
          docker push $IMAGE

  # ────────────────────────────── Gateway ──────────────────────────────
  test-gateway:
    needs: changes
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :gateway:test

  build-gateway:
    needs: [changes, test-gateway]
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - run: chmod +x gradlew
      - run: ./gradlew :gateway:build

  docker-gateway:
    needs: [changes, build-gateway]
    if: needs.changes.outputs.gateway == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/gateway:${GITHUB_SHA}
          docker build -t $IMAGE -f gateway/Dockerfile .
          docker push $IMAGE

  docker-docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push docs
        working-directory: docs-project
        run: |
          IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/docs:${GITHUB_SHA}
          docker build -t $IMAGE .
          docker push $IMAGE